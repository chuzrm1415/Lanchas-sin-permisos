micronaut:
  application:
    name: tours-service
  server:
    port: 8081
    cors:
      enabled: true
      configurations:
        all:
          allowedOrigins:
            - "http://localhost:5173"
            - "http://localhost:3000"
          allowedMethods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          allowedHeaders:
            - Content-Type
            - Authorization

datasources:
  default:
    url: jdbc:h2:mem:toursdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: ""
    schema-generate: CREATE_DROP
    dialect: H2

logger:
  levels:
    com.marketplace.tours: DEBUG
